<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8A Countdown</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f0c29; background: linear-gradient(to bottom, #24243e, #302b63, #0f0c29); color: white; font-family: 'Segoe UI', Arial; text-align: center; }
        h1 { font-size: 24px; color: #ffcc00; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .timer { display: flex; gap: 15px; }
        .time-box { background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 10px; min-width: 70px; border: 1px solid #ffcc00; }
        .num { font-size: 35px; font-weight: bold; display: block; color: #00ffcc; }
        .label { font-size: 12px; text-transform: uppercase; color: #aaa; }
        .message { margin-top: 30px; font-size: 18px; color: #ff99cc; font-style: italic; padding: 0 20px; }
    </style>
</head>
<body>
    <h1>Đếm ngược đến Ngày Phụ nữ Việt Nam 20/10</h1>
    
    <div class="timer">
        <div class="time-box"><span class="num" id="days">00</span><span class="label">Ngày</span></div>
        <div class="time-box"><span class="num" id="hours">00</span><span class="label">Giờ</span></div>
        <div class="time-box"><span class="num" id="mins">00</span><span class="label">Phút</span></div>
        <div class="time-box"><span class="num" id="secs">00</span><span class="label">Giây</span></div>
    </div>

    <div class="message">
        "Lớp 8A quyết tâm học tốt để dành tặng cô Nga những bông hoa điểm 10 rực rỡ nhất!" 🌹
    </div>

    <script>
        // Đặt ngày đích là 20/10/2026
        const countDownDate = new Date("Oct 20, 2026 00:00:00").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = days;
            document.getElementById("hours").innerHTML = hours;
            document.getElementById("mins").innerHTML = minutes;
            document.getElementById("secs").innerHTML = seconds;

            if (distance < 0) {
                clearInterval(x);
                document.querySelector(".timer").innerHTML = "CHÚC MỪNG 20/10!";
            }
        }, 1000);
    </script>
</body>
</html>
