<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8A Gift for Mrs. Nga</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff0f5; font-family: Arial; touch-action: none; }
        canvas { display: block; background: linear-gradient(#ffe6f2, #fff); }
        #ui { position: absolute; top: 15px; width: 100%; text-align: center; color: #d81b60; font-size: 20px; font-weight: bold; pointer-events: none; }
        #win-screen { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.2); text-align: center; width: 80%; border: 3px solid #ff3385; }
    </style>
</head>
<body>
    <div id="ui">🎁 Điểm của cô: <span id="score">0</span> / 100</div>
    <div id="win-screen">
        <h2 style="color: #ff3385;">🎉 CHIẾN THẮNG! 🎉</h2>
        <p style="font-size: 18px;">Ôi thôi check, e đã đc 1 căn villa ràu thôi đừng chơi nữa!</p>
        <button onclick="location.reload()" style="background:#ff3385; color:white; border:none; padding:10px 20px; border-radius:10px;">Chơi lại</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const winScreen = document.getElementById('win-screen');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let score = 0; let gameOver = false; const items = [];
        const basket = { x: canvas.width / 2 - 55, y: canvas.height - 120, w: 110, h: 70 };
        const emojis = ["🌹", "🌸", "💐", "💖", "🎁"];
        function move(e) {
            if (gameOver) return;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            basket.x = clientX - basket.w / 2;
            if (basket.x < 0) basket.x = 0;
            if (basket.x > canvas.width - basket.w) basket.x = canvas.width - basket.w;
        }
        window.addEventListener('touchmove', move); window.addEventListener('mousemove', move);
        function create() { if (!gameOver) items.push({ x: Math.random()*(canvas.width-40), y: -50, s: 3+Math.random()*4, icon: emojis[Math.floor(Math.random()*emojis.length)] }); }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#8b4513"; ctx.fillRect(basket.x, basket.y, basket.w, basket.h);
            ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.fillText("CLASS 8A", basket.x + 20, basket.y + 40);
            for (let i = items.length-1; i>=0; i--) {
                let it = items[i]; it.y += it.s;
                ctx.font = "40px Arial"; ctx.fillText(it.icon, it.x, it.y);
                if (it.y > basket.y && it.y < basket.y + basket.h && it.x > basket.x - 20 && it.x < basket.x + basket.w) {
                    score++; scoreEl.innerText = score; items.splice(i,1);
                    if(score==10) alert("Cô còn đang non nhoá!");
                    if(score==20) alert("Nếu mà chơi đến đây thì cô chứ cs thưởng mô");
                    if(score==50) alert("Phần quà của cô là iPhone 17 Pro Max nhá nhưng chơi đến 100đ sẽ cs bất ngờ");
                    if(score==100) { gameOver=true; winScreen.style.display='block'; alert("Ôi thôi check, cô đã đc 1 căn villa ràu thôi đừng chơi nữa"); }
                } else if (it.y > canvas.height) items.splice(i,1);
            }
            requestAnimationFrame(draw);
        }
        setInterval(create, 800); draw();
    </script>
</body>
</html>
