<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8A Hardcore Challenge</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: Arial; touch-action: none; }
        canvas { display: block; background: radial-gradient(#4b0082, #000); }
        #ui { position: absolute; top: 15px; width: 100%; text-align: center; color: #ff00ff; font-size: 22px; font-weight: bold; pointer-events: none; text-shadow: 0 0 10px #ff00ff; }
        #msg-box { position: absolute; top: 60px; width: 100%; text-align: center; color: white; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">🏆 Điểm: <span id="score">0</span> | ❤️ Mạng: <span id="lives">3</span></div>
    <div id="msg-box">CHẾ ĐỘ SIÊU KHÓ - CÔ NGA CẨN THẬN!</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0; let lives = 3; let gameOver = false;
        const items = [];
        // Giỏ nhỏ hơn bản cũ (chỉ rộng 80px thay vì 110px)
        const basket = { x: canvas.width / 2 - 40, y: canvas.height - 100, w: 80, h: 50 };
        const rewards = ["🌹", "🎁", "💎", "🌸"];
        const traps = ["💣", "👾"];

        function move(e) {
            if (gameOver) return;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            basket.x = clientX - basket.w / 2;
        }
        window.addEventListener('touchmove', move);
        window.addEventListener('mousemove', move);

        function createItem() {
            if (gameOver) return;
            const isTrap = Math.random() < 0.3; // 30% tỷ lệ ra bom
            items.push({
                x: Math.random() * (canvas.width - 30),
                y: -50,
                // Tốc độ tăng dần theo điểm số
                s: (3 + Math.random() * 5) + (score / 15), 
                icon: isTrap ? traps[Math.floor(Math.random()*traps.length)] : rewards[Math.floor(Math.random()*rewards.length)],
                type: isTrap ? 'trap' : 'reward'
            });
        }

        function draw() {
            if (gameOver) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Vẽ giỏ CLASS 8A
            ctx.fillStyle = "#ff00ff";
            ctx.fillRect(basket.x, basket.y, basket.w, basket.h);
            ctx.fillStyle = "white";
            ctx.font = "bold 12px Arial";
            ctx.fillText("8A ELITE", basket.x + 10, basket.y + 30);

            for (let i = items.length - 1; i >= 0; i--) {
                let it = items[i];
                it.y += it.s;
                ctx.font = "35px Arial";
                ctx.fillText(it.icon, it.x, it.y);

                // Kiểm tra va chạm
                if (it.y > basket.y && it.y < basket.y + basket.h && it.x > basket.x - 20 && it.x < basket.x + basket.w) {
                    if (it.type === 'reward') {
                        score++;
                        scoreEl.innerText = score;
                        if(score === 10) alert("Mới có 10 điểm thôi cô ơi!");
                        if(score === 50) alert("Cô Nga bắt đầu thấy khó chưa ạ?");
                    } else {
                        lives--;
                        livesEl.innerText = lives;
                        alert("BÙM! Cô dẫm phải bom rồi!");
                        if (lives <= 0) {
                            gameOver = true;
                            alert("GAME OVER! Cô không lấy được villa rồi. Chúc cô 8/3 vui vẻ!");
                            location.reload();
                        }
                    }
                    items.splice(i, 1);
                } else if (it.y > canvas.height) {
                    items.splice(i, 1);
                }
            }
            requestAnimationFrame(draw);
        }

        setInterval(createItem, 600); // Rơi dồn dập hơn
        draw();
    </script>
</body>
</html>
